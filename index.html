<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Recibo Elocon</title>
</head>
<body>
    <div class="container">
        <div class="header">
            <img src="img/WhatsApp_Image_2026-04-24_at_18.27.26__3_-removebg-preview.png" alt="Logo Elocon" class="logo">
        <h2>Recibo Elocon</h2>
        <p>Preencha para gerar o recibo</p>
      </div>

        <!--campos do formulário-->
        <div class="section">
            <h3>Dados do consórcio</h3>

            <div id="listaConsorcios">

        <div class="grid consorcio-item">
            <div class="form-group">
                <label for="Grupo">Grupo</label>
                <input type="text" class="grupo">
            </div>

            <div class="form-group">
                <label for="Cota">Cota</label>
                <input type="text" class="cota">
            </div>

            <div class="form-group">
                <label for="Contrato">Contrato</label>
                <input type="text" class="contrato">
            </div>
        <!--<div class="form-group">
            <label for="Grupo">Grupo:</label>
            <input type="text" id="grupo" placeholder="Digite o grupo">
        </div>

         <div class="form-group">
            <label for="Cota">Cota:</label>
            <input type="text" id="cota" placeholder="digite a cota">
            </div>

             <div class="form-group">
            <label for="Contrato">Contrato:</label>
            <input type="text" id="contrato" placeholder="digite o contrato">
             </div>-->
             </div>

            </div>

            <button type="button" class="btn" onclick="adicionarConsorcio()"> 
                + adicionar
            </button>
             </div>
             
              <div class="section">
            <h3>Dados do Cliente</h3>
        <div class="grid">
             <div class="form-group full">
            <label for="nome">Nome:</label>
            <input type="text" id="nome" placeholder="Digite o nome completo">
        </div>

        <div class="form-group">
            <label for="cpf">CPF/CNPJ:</label>
            <input type="text" id="cpf" placeholder="000-000-000-00">
        </div>
        </div>

         <div class="form-group">
            <label for="telefone">Telefone</label>
            <input type="text" id="telefone" placeholder="(00) 0 0000-0000">
        </div>

         <div class="form-group">
            <label for="administradora">Administradora</label>
            <input type="text" id="administradora" placeholder="">
        </div>
         
         <div class="form-group">
            <label for="cidadeCartorio">Cidade do cartório</label>
            <input type="text" id="cidadeCartorio" placeholder="Digite a cidade">
        </div>
        </div>

        

         <div class="section">
            <h3>Dados Bancários</h3>
        <div class="grid">
        <div class="form-group">
            <label for="pix">Chave PIX:</label>
            <input type="text" id="pix" placeholder="Digite a chave PIX">
            </div>
            
        <div class="form-group">
            <label for="banco">Banco:</label>
            <input type="text" id="banco" placeholder="digite o banco">
            </div>
            
        <div class="form-group">
            <label for="agência">Agência:</label>
            <input type="text" id="agencia" placeholder="digite a agência">
            </div>
            
        <div class="form-group">
            <label for="conta">Conta:</label>
            <input type="text" id="conta" placeholder="Digite a conta">
            </div>
            
        <div class="form-group">
            <label for="tipo">Tipo:</label>
            <input type="text" id="tipo" placeholder="Corrente ou Poupança">
        </div>

        <div class="form-group">
            <label for="nomeRecebedor">Nome:</label>
            <input type="text" id="nomeRecebedor" placeholder="Digite o nome do recebedor">
        </div>

        <div class="form-group">
            <label for="cpfRecebedor">CPF/CNPJ</label>
            <input type="text" id="cpfRecebedor" placeholder="CPF ou CNPJ do recebedor">
        </div>
        </div>

        <div class="form-group">
            <label for="valor">Valor R$</label>
            <input type="text" id="valor" placeholder="Ex: 60000">
        </div>
        </div>
       <!-- <div class="form-group">
            <label for="Qualifiação">Qualificação:</label>
            <input type="text" id="Qualificação" placeholder="Ex: Médico, Enfermeiro, etc.">
        </div>
        <div class="form-group">
            <label for="Endereço">Endereço:</label>
            <input type="text" id="Endereço" placeholder="Rua, cidade, número, etc">
        </div>
        <div class="form-group">
            <label for="Cep">Cep:</label>
            <input type="number" id="Cep" placeholder="00000-000">
        </div> -->
    
       <!-- <button class="btn" onclick="co">Tudo certo! Agora vamos imprimir seu formulário. Clique em Imprimir</button>-->
        <div class="form-group">
    <label for="data">Data</label>
    <input type="date" id="data">
</div>
       <button class="btn" onclick="gerarWord()" id="btnGerar">
       <span id="btnText">Gerar Recibo Word</span></button>
       <button class="btn" onclick="gerarPDF()">Gerar Recibo PDF</button>
       <!-- <button class="btn" onclick="window.print()">Imprimir</button> -->
    </div>
    </div>
    <script src="https://unpkg.com/docx@8.5.0/build/index.umd.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="script.js"></script>
    <div id="toast" class="toast">Preencha todos os campos obrigatórios!</div>
</body>
</html>
